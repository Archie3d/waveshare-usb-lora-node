# https://taskfile.dev

version: '3'

vars:
  OUTPUT_DIR: "./target"

tasks:
  build:
    deps: [make_target_dir, generate]
    cmds:
      - go build -o {{.OUTPUT_DIR}} ./...

  build-linux-arm64:
    deps: [make_target_dir, generate]
    cmds:
      - GOOS=linux GOARCH=arm64 go build -o {{.OUTPUT_DIR}} ./...

  release:
    deps: [make_target_dir, generate]
    cmds:
      - go  build -o {{.OUTPUT_DIR}} -ldflagd "-s -w" ./...

  build-release-linux-arm64:
    deps: [make_target_dir, generate]
    cmds:
      - GOOS=linux GOARCH=arm64 go build -o {{.OUTPUT_DIR}} -ldflags "-s -w" ./...

  test:
    cmds:
      - go test ./...

  clean:
    cmds:
      - go clean -testcache
      - rm -f {{.OUTPUT_DIR}}/ws-node
    silent: true

  generate:
    cmds:
      - go generate ./...

  make_target_dir:
    cmds:
      - mkdir -p {{.OUTPUT_DIR}}
    silent: true
